name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for committed secrets
        run: |
          if grep -r "cfxk_" server-data/server.cfg; then
            echo "ERROR: License key found in server.cfg — use server.cfg.local"
            exit 1
          fi
          echo "No secrets in server.cfg — OK"

      - name: Lint Lua files
        uses: lunarmodules/luacheck@v1
        with:
          args: server-data/resources/syndicate-*/
        continue-on-error: true

  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    needs: validate
    # Only deploy when SERVER_HOST secret is configured
    if: ${{ vars.DEPLOYMENT_ENABLED == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /srv/syndicaterp
            git pull origin main
            curl -s -X POST "http://localhost:40120/api/txadmin/server/restart" \
              -H "Authorization: Bearer ${{ secrets.TXADMIN_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d '{"reason":"GitHub deploy"}'
            echo "Deploy complete."
