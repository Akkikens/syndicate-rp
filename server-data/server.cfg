# ────────────────────────────────────────────────
#  Syndicate RP — FiveM Server Configuration
#  Secrets live in server.cfg.local (gitignored)
#  Run: bash scripts/setup-db.sh to generate it
# ────────────────────────────────────────────────

# Load secrets (license key, DB password) from local file
exec "server.cfg.local"

# ── Identity ──────────────────────────────────────
sv_hostname "^1Syndicate RP ^7| ^2Car Culture ^7| ^3Premium FiveM"
sv_projectName "Syndicate RP"
sv_projectDesc "Premium car culture & RP server. Custom cars, drag racing, crew wars."
sets tags "car culture, racing, rp, custom cars, fivem, qbox"
sets locale "en-US"
sets banner_detail "https://i.imgur.com/placeholder.png"
sets banner_connecting "https://i.imgur.com/placeholder.png"

# ── Network ───────────────────────────────────────
endpoint_add_tcp "0.0.0.0:30120"
endpoint_add_udp "0.0.0.0:30120"
sv_maxclients 128

# ── OneSync ───────────────────────────────────────
# "on" = OneSync Infinity (the only correct value for licensed servers).
# NOTE: "infinity" is NOT a valid convar value — it silently disables OneSync.
set onesync on

# ── Steam / Endpoints ─────────────────────────────
# sv_steamWebApiKey "REPLACE_IF_USING_STEAM_AUTH"

# ── Rate Limits / Hardening ───────────────────────
sv_endpointPrivacy true
set sv_enforceGameBuild 3258

# ── Voice ─────────────────────────────────────────
# Using mumble-voip (ox recommended)
setr voice_enableProximityCycle 1

# ─────────────────────────────────────────────────
#  RESOURCE LOAD ORDER
#  Dependencies must load before dependents.
#  Grouped by category — do not reorder carelessly.
# ─────────────────────────────────────────────────

# ── System Resources (cfx-server-data base) ──────
ensure sessionmanager
ensure baseevents
ensure hardcap

# ── Framework convars (MUST be set before qbx_core starts) ──
# qbx_core refuses to boot (and quits the server) unless ox_inventory
# is told it's running in Qbox mode. ox_inventory reads this too.
setr inventory:framework "qbx"

# ── Core Infrastructure ───────────────────────────
ensure oxmysql
ensure ox_lib

# ── Framework ─────────────────────────────────────
ensure qbx_core

# ── Inventory ─────────────────────────────────────
ensure ox_inventory

# ── UI / HUD ──────────────────────────────────────
ensure syndicate-hud

# ── Server Config ─────────────────────────────────
ensure syndicate-config

# ── Gameplay Core ─────────────────────────────────
ensure ox_doorlock
ensure qbx_vehicles
ensure qbx_garages
ensure ps-fuel
ensure qbx_phone

# ── Economy ───────────────────────────────────────
# ensure qbx_banking      # install manually when available
# ensure qbx_shops        # install manually when available

# ── Jobs ──────────────────────────────────────────
# ensure qbx_mechanicjob  # install manually when available

# ── Handling (GTA VI cinematic physics) ───────────
# ensure TairaRealisticHandling  # download from forum.cfx.re
ensure Drive-V                   # cinematic weight + deformation
ensure syndicate-handling        # Syndicate-specific overrides (loads last)

# ── Map (Vice City) ────────────────────────────────
# ensure VICECRY_FM_W          # uncomment after manual install (see docs/visual-setup.md)

# ── Maps (gta5-mods imports — FiveM-compatible ymap/MLO only) ──
ensure burgershot              # full MLO interior (ships its own fxmanifest)
ensure highfield_mansion       # ymap prop map
ensure villa_jayway            # ymap prop map

# ── Syndicate Custom ──────────────────────────────
ensure syndicate-racing
ensure syndicate-clubs    # must load before syndicate-meets
ensure syndicate-meets    # depends on syndicate-clubs export

# ── Admin ─────────────────────────────────────────
# ensure es_extended_adminmenu  # install manually when available

# ─────────────────────────────────────────────────
#  ACE PERMISSIONS
# ─────────────────────────────────────────────────

# Superadmin group (txAdmin manages individual assignments)
# TODO(launch): after first join, run `status` in the txAdmin live console to see
# your own license id, then uncomment the line below with it (or just grant yourself
# admin via the txAdmin web panel — recommended). Left commented so boot stays clean.
# add_principal identifier.license:YOUR_ROCKSTAR_LICENSE group.superadmin
add_ace group.superadmin command allow
add_ace group.superadmin command.add_principal allow
add_ace group.superadmin command.remove_principal allow

add_ace group.admin command allow
add_ace group.moderator command.kick allow
add_ace group.moderator command.ban allow

# ─────────────────────────────────────────────────
#  CONVARS (shared with client)
# ─────────────────────────────────────────────────
setr sv_serverId 1
setr syndicate_serverName "Syndicate RP"
setr syndicate_discordUrl "https://discord.gg/REPLACE"   # TODO(launch): your real Discord invite
setr syndicate_tebexUrl "https://syndicaterp.tebex.io"   # TODO(launch): your real Tebex store slug
setr syndicate_maxGarageSlots 10
setr syndicate_vipGarageSlots 20
setr syndicate_eliteGarageSlots 50
